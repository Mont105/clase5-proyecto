<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="stiles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Miranda+Sans:ital,wght@0,400..700;1,400..700&display=swap"
        rel="stylesheet">
    <title>Login</title>
</head>

<body>
    <div class="form-container">
        <div class="form-header">
            <h3>Iniciar Sesión</h3>
        </div>
        <div class="input-container">
            <input id="login-username" type="text" placeholder="Usuario" required>
            <input id="login-password" type="password" placeholder="Contraseña" required>
            <div class="forgot-password">
                <a href="Rps.html">¿Olvidaste tu contraseña?</a>
            </div>
            <div class="botton">
                <button id="btn-login" class="submit" type="button">Iniciar Sesión</button>
            </div>
            <p id="login-message" style="text-align:center; margin-top:10px; font-size:14px;"></p>
            <div class="signup">
                no tienes cuenta?<a href="register.html"> registrate</a>
            </div>
        </div>
    </div>
    <div class="relleno">
        <span>🤨Bienvenido al inicio de sesión, ¿seguro que tienes una cuenta?</span>
    </div>

    <script>
        document.getElementById('btn-login').addEventListener('click', async function () {
            const username = document.getElementById('login-username').value;
            const password = document.getElementById('login-password').value;
            const messageEl = document.getElementById('login-message');

            // Limpiar mensaje anterior
            messageEl.textContent = '';
            messageEl.style.color = '';

            try {
                const response = await fetch('http://localhost:5000/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        username: username,
                        password: password
                    })
                });

                const data = await response.json();

                if (data.success) {
                    messageEl.style.color = '#4CAF50';
                    messageEl.textContent = data.message;
                    // Redirigir al index después de 2 segundos
                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 2000);
                } else {
                    messageEl.style.color = '#f44336';
                    messageEl.textContent = data.message;
                }
            } catch (error) {
                messageEl.style.color = '#f44336';
                messageEl.textContent = 'Error de conexión con el servidor. Asegúrate de que el backend esté corriendo.';
            }
        });
    </script>
</body>

</html>
